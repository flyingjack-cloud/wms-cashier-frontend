server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # App shell: never cache. The browser must revalidate on every load
    # (cheap 304 via ETag), so a new deploy is picked up on the next refresh.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Fingerprinted build output (hash in filename, e.g. main-RVVWHNXN.js):
    # content is immutable for a given name, so cache it forever.
    location ~* "-[A-Za-z0-9]{8,}\.(?:js|css)$" {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images (favicon, /assets images): not functional, tolerate short staleness.
    # Cache for a day. Note: receipt.css is CSS, not matched here, so it stays no-cache.
    location ~* "\.(?:png|jpe?g|gif|svg|webp|avif|ico)$" {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA routes + other non-fingerprinted assets (e.g. receipt.css): revalidate,
    # so functional files propagate on the next load without long caching.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
