<h2 mat-dialog-title>当前库存统计如下</h2>
<mat-dialog-content>
  <table mat-table [dataSource]="dataSource">

    <ng-container matColumnDef="model">
      <th mat-header-cell *matHeaderCellDef> 型号 </th>
      <td mat-cell *matCellDef="let element"> {{ element.cateName }} </td>
      <td mat-footer-cell *matFooterCellDef>总计</td>
    </ng-container>

    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef> 总数 </th>
      <td mat-cell *matCellDef="let element"> {{ element.total }} </td>
      <td mat-footer-cell *matFooterCellDef>{{ getTotalCount("total") }}</td>
    </ng-container>

    <ng-container matColumnDef="sold">
      <th mat-header-cell *matHeaderCellDef> 已售 </th>
      <td mat-cell *matCellDef="let element"> {{ element.sold }} </td>
      <td mat-footer-cell *matFooterCellDef>{{ getTotalCount("sold") }}</td>
    </ng-container>

    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef> 库存 </th>
      <td mat-cell *matCellDef="let element"> {{ element.total - element.sold }} </td>
      <td mat-footer-cell *matFooterCellDef>{{ getTotalStock() }}</td>
    </ng-container>

    <ng-container matColumnDef="cost">
      <th mat-header-cell *matHeaderCellDef> 成本 </th>
      <td mat-cell *matCellDef="let element"> {{ element.totalCost }} </td>
      <td mat-footer-cell *matFooterCellDef>{{ getTotalCost() }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef> 售价 </th>
      <td mat-cell *matCellDef="let element"> {{ element.totalPrice }} </td>
      <td mat-footer-cell *matFooterCellDef>{{ getTotalPrice() }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="footer" mat-footer-row *matFooterRowDef="displayedColumns"></tr>
  </table>

  <mat-dialog-actions>
    <button mat-button color="primary" mat-dialog-close type="button" >关闭</button>
  </mat-dialog-actions>
</mat-dialog-content>
